apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: claude-remote
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/yox2yox/homelab-k3s.git
    targetRevision: main
    path: apps/claude-remote
    directory:
      include: "claude-remote.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: claude-remote
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
